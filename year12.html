<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade 12 · IB Computer Science</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f4fb;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1e293b;
      padding: 2rem 1.5rem;
      line-height: 1.5;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }

    .nav {
      background: #0b2a4a;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.8rem;
      margin-bottom: 2.8rem;
      box-shadow: 0 8px 20px rgba(0,20,40,0.08);
    }
    .nav a {
      color: #e6edf5;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .nav a i { font-size: 0.9rem; opacity: 0.7; }
    .nav a:hover { color: #ffffff; text-decoration: underline; text-underline-offset: 4px; }
    .nav .brand {
      margin-right: auto;
      font-weight: 600;
      color: white;
      font-size: 1.1rem;
    }
    .nav .brand i { margin-right: 8px; color: #7bb3ff; }

    .main-title {
      font-size: 2.8rem;
      font-weight: 700;
      color: #0b2a4a;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .main-title i { color: #2a6f97; font-size: 2.2rem; }
    .subhead {
      color: #475569;
      font-size: 1rem;
      margin-bottom: 2.5rem;
      border-left: 4px solid #2a6f97;
      padding-left: 1.2rem;
      font-weight: 400;
      background: #e9eff8;
      display: inline-block;
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
    }

    .grade-tabs {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 2.5rem;
      background: white;
      padding: 0.5rem;
      border-radius: 60px;
      border: 1px solid #e5edf5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      width: fit-content;
    }
    .grade-tabs a {
      padding: 0.5rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #475569;
      text-decoration: none;
      transition: 0.2s;
    }
    .grade-tabs a.active {
      background: #0b2a4a;
      color: white;
      box-shadow: 0 4px 12px rgba(11,42,74,0.2);
    }
    .grade-tabs a:hover:not(.active) {
      background: #eef4fa;
    }

    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    .unit-card {
      background: white;
      border-radius: 24px;
      padding: 1.8rem 1.5rem 1.5rem;
      box-shadow: 0 4px 14px rgba(0, 20, 40, 0.04), 0 1px 3px rgba(0,0,0,0.02);
      border: 1px solid #e5edf5;
      transition: 0.25s ease;
      text-decoration: none;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .unit-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(to right, #2a6f97, #7bb3ff);
      opacity: 0;
      transition: 0.3s;
    }
    .unit-card:hover {
      border-color: #b6d0e8;
      box-shadow: 0 12px 30px rgba(0, 32, 64, 0.08);
      transform: translateY(-3px);
    }
    .unit-card:hover::before { opacity: 1; }

    .unit-card.completed {
      background: #e6f7e6;
      border-color: #2d8f2d;
    }
    .unit-card.completed::before {
      background: linear-gradient(to right, #2d8f2d, #4caf50);
      opacity: 1;
    }
    .unit-card.completed .cover-status label {
      color: #2d8f2d;
      font-weight: 600;
    }
    .unit-card.completed .cover-status .check-icon {
      color: #2d8f2d;
    }

    .unit-card h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0b2a4a;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .unit-card h3 i {
      color: #2a6f97;
      font-size: 1.1rem;
      width: 1.6rem;
    }
    .unit-card .unit-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.7rem;
      border-radius: 40px;
      background: #dceaf7;
      color: #13416b;
      margin-left: 6px;
    }
    .unit-card .unit-badge.hl {
      background: #f7d9d9;
      color: #a13232;
    }
    .unit-card .unit-badge.core {
      background: #cfe3d0;
      color: #1d5e3a;
    }

    .unit-card .cover-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: #475569;
      padding-top: 0.8rem;
      border-top: 1px solid #eef2f6;
    }
    .unit-card .cover-status .check-icon {
      font-size: 1rem;
      color: #b6cfe5;
      transition: 0.2s;
    }
    .unit-card.completed .cover-status .check-icon {
      color: #2d8f2d;
    }

    .unit-card .arrow {
      margin-left: auto;
      color: #b6cfe5;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    .unit-card:hover .arrow {
      color: #2a6f97;
      transform: translateX(3px);
    }
    .unit-card.completed .arrow {
      color: #2d8f2d;
    }

    .case-study-card {
      background: linear-gradient(135deg, #f8f4ec, #f0ebe0);
      border-color: #e8dfd0;
    }
    .case-study-card::before {
      background: linear-gradient(to right, #b8943e, #d4b87a);
    }
    .case-study-card h3 i { color: #b8943e; }

    .ia-card {
      background: linear-gradient(135deg, #ecf4f8, #e0ebf0);
      border-color: #d0dfe8;
    }
    .ia-card::before {
      background: linear-gradient(to right, #3e8fb8, #7ab8d4);
    }
    .ia-card h3 i { color: #3e8fb8; }

    .divider-light { margin: 3rem 0 0.2rem; border: 0; height: 1px; background: linear-gradient(to right, #d4e0ec, transparent); }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .nav { flex-direction: column; align-items: flex-start; border-radius: 30px; gap: 0.6rem; }
      .nav .brand { margin-right: 0; }
      .main-title { font-size: 2rem; flex-wrap: wrap; }
      .unit-grid { grid-template-columns: 1fr; }
      .grade-tabs { width: 100%; justify-content: center; }
      .grade-tabs a { padding: 0.4rem 1.2rem; font-size
