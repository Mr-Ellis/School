<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1.1 Approaches to Computational Thinking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4fb;
            color: #1e293b;
            padding: 24px;
            line-height: 1.6;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        .header {
            background: #0b2a4a;
            color: #fff;
            padding: 30px 35px;
            border-radius: 12px 12px 0 0;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
        }
        .header .subtitle {
            font-size: 1.1rem;
            opacity: 0.85;
            margin-top: 4px;
        }
        .back-link {
            display: inline-block;
            margin-top: 12px;
            color: #7bb3ff;
            text-decoration: none;
        }
        .back-link:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* --- CARD --- */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 20px;
            border: 1px solid #e2e8f0;
            transition: background-color 0.4s ease;
        }
        .card.covered {
            background: #e6f7e6;
            border-color: #2d8f2d;
        }
        .card-header {
            background: #f1f4f9;
            padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .card.covered .card-header {
            background: #d4edda;
            border-bottom-color: #b7d7b7;
        }
        .card-header h2 {
            font-size: 1.2rem;
            color: #0b2a4a;
        }
        .badge {
            background: #b21f1f;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .card-body {
            padding: 24px 24px 20px;
        }

        /* --- BUTTONS - SAME SIZE --- */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 200px;
            text-align: center;
        }
        .btn-summary {
            background: #0b2a4a;
            color: #fff;
        }
        .btn-summary:hover {
            background: #1a3f64;
        }
        .btn-locked {
            background: #e2e8f0;
            color: #4a5568;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-locked:hover {
            background: #d5dce6;
        }
        .btn-locked .lock-icon {
            font-size: 1rem;
        }

        /* --- PASSWORD MODAL (hidden by default) --- */
        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .password-modal.show {
            display: flex;
        }
        .password-box {
            background: #fff;
            padding: 30px 35px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        .password-box h3 {
            margin-bottom: 8px;
            color: #0b2a4a;
        }
        .password-box p {
            font-size: 0.9rem;
            color: #4a5568;
            margin-bottom: 16px;
        }
        .password-box input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
        }
        .password-box input[type="password"]:focus {
            border-color: #0b2a4a;
        }
        .password-box .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .password-box .btn-row button {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .password-box .btn-row .btn-cancel {
            background: #e2e8f0;
            color: #4a5568;
        }
        .password-box .btn-row .btn-cancel:hover {
            background: #d5dce6;
        }
        .password-box .btn-row .btn-submit {
            background: #0b2a4a;
            color: #fff;
        }
        .password-box .btn-row .btn-submit:hover {
            background: #1a3f64;
        }
        .password-box .error-msg {
            color: #b21f1f;
            font-size: 0.85rem;
            margin-top: -8px;
            margin-bottom: 12px;
            display: none;
        }
        .password-box .error-msg.show {
            display: block;
        }

        /* --- COVER CHECKBOX (Teacher Only) --- */
        .cover-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .cover-section input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #0b2a4a;
            cursor: default;
            pointer-events: none;
            opacity: 0.7;
        }
        .cover-section label {
            cursor: default;
            font-weight: 500;
            color: #0b2a4a;
        }
        .cover-section .teacher-edit {
            font-size: 0.75rem;
            color: #6b7f8f;
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            margin-left: 6px;
        }
        .cover-section .teacher-edit:hover {
            background: #d5dce6;
        }
        .cover-section .teacher-badge {
            font-size: 0.65rem;
            background: #cbd5e1;
            color: #334155;
            padding: 1px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .header { padding: 20px; }
            .card-header { flex-direction: column; align-items: flex-start; }
            .button-group { flex-direction: column; }
            .btn { min-width: unset; width: 100%; }
            .password-box { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>B1.1 Approaches to Computational Thinking</h1>
        <div class="subtitle">IB Computer Science • Core Topic</div>
        <a class="back-link" href="../year11.html">← Back to Grade 11 Units</a>
    </div>

    <!-- CARD -->
    <div class="card" id="lessonCard">
        <div class="card-header">
            <h2>B1.1.1 Problem Specification</h2>
            <span class="badge">Core</span>
        </div>
        <div class="card-body">

            <!-- BUTTONS -->
            <div class="button-group">
                <a class="btn btn-summary" href="b1-1-1-summary.html">📖 View Lesson Summary</a>
                <button class="btn btn-locked" id="unlockBtn">
                    <span class="lock-icon">🔒</span> View Lesson Plan
                </button>
            </div>

            <!-- COVER CHECKBOX – TEACHER ONLY -->
            <div class="cover-section">
                <input type="checkbox" class="cover-checkbox" id="cover-B1.1.1">
                <label for="cover-B1.1.1">✓ Mark this lesson as covered</label>
                <span class="teacher-badge">Teacher only</span>
                <span class="teacher-edit" id="toggleCover">(toggle)</span>
            </div>

        </div>
    </div>

</div>

<!-- PASSWORD MODAL -->
<div class="password-modal" id="passwordModal">
    <div class="password-box">
        <h3>🔒 Lesson Plan Locked</h3>
        <p>Enter the password to view the lesson plan.</p>
        <input type="password" id="passwordInput" placeholder="Enter password...">
        <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>
        <div class="btn-row">
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
            <button class="btn-submit" id="submitBtn">Unlock</button>
        </div>
    </div>
</div>

<!-- PERSISTENT CHECKBOX + TEACHER TOGGLE + PASSWORD -->
<script>
    (function() {
        // --- COVER CHECKBOX ---
        const checkbox = document.getElementById('cover-B1.1.1');
        const card = document.getElementById('lessonCard');
        const toggleBtn = document.getElementById('toggleCover');
        if (checkbox && card && toggleBtn) {
            const storageKey = 'covered_' + checkbox.id;

            const savedState = localStorage.getItem(storageKey);
            if (savedState === 'true') {
                checkbox.checked = true;
                card.classList.add('covered');
            }

            function toggleCover() {
                const isChecked = !checkbox.checked;
                checkbox.checked = isChecked;
                localStorage.setItem(storageKey, isChecked ? 'true' : 'false');
                if (isChecked) {
                    card.classList.add('covered');
                } else {
                    card.classList.remove('covered');
                }
            }

            toggleBtn.addEventListener('click', function(e) {
                e.preventDefault();
                toggleCover();
            });

            const label = document.querySelector('.cover-section label');
            if (label) {
                label.addEventListener('dblclick', function(e) {
                    e.preventDefault();
                    toggleCover();
                });
            }

            checkbox.addEventListener('keydown', function(e) {
                e.preventDefault();
            });
        }

        // --- PASSWORD MODAL ---
        const modal = document.getElementById('passwordModal');
        const unlockBtn = document.getElementById('unlockBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');

        // Set your password here
        const CORRECT_PASSWORD = 'teacher123'; // CHANGE THIS

        function openModal() {
            modal.classList.add('show');
            passwordInput.value = '';
            errorMsg.classList.remove('show');
            passwordInput.focus();
        }

        function closeModal() {
            modal.classList.remove('show');
        }

        function checkPassword() {
            const entered = passwordInput.value;
            if (entered === CORRECT_PASSWORD) {
                closeModal();
                // Redirect to the lesson plan (update this URL)
                window.open('../lessonplans/DP Computer Science_ B 1.1.1.pdf', '_blank');
            } else {
                errorMsg.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        unlockBtn.addEventListener('click', openModal);
        cancelBtn.addEventListener('click', closeModal);
        submitBtn.addEventListener('click', checkPassword);

        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkPassword();
            }
        });

        // Close modal if user clicks outside the box
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });
    })();
</script>

</body>
</html>
